<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Whisper+me</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .admin-header {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .admin-header h1 {
            color: #ef4444;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        
        .admin-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .admin-btn {
            background: #333;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .admin-btn.primary {
            background: #7c3aed;
        }
        
        .admin-btn.danger {
            background: #ef4444;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        .admin-section {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #7c3aed;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #222;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        
        th {
            color: #888;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            color: #888;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .complaint-item {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .complaint-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .complaint-rating {
            color: #fbbf24;
            font-weight: 600;
        }
        
        .complaint-comment {
            color: #aaa;
            font-style: italic;
            margin-top: 0.5rem;
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        
        .login-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
        }
        
        .login-title {
            text-align: center;
            color: #ef4444;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }
        
        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        @media (max-width: 768px) {
            .admin-controls {
                flex-direction: column;
            }
            
            table {
                display: block;
                overflow-x: auto;
            }
            
            .login-box {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h2 class="login-title">Admin Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="admin-email" value="ifanifwasafifth@gmail.com" readonly>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-password" placeholder="Enter admin password">
            </div>
            <button class="admin-btn primary" onclick="adminLogin()" style="width: 100%; padding: 1rem;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div class="login-error" id="login-error"></div>
            <a href="../" style="display: block; text-align: center; margin-top: 1.5rem; color: #7c3aed; text-decoration: none;">
                ← Back to Main Site
            </a>
        </div>
    </div>
    
    <!-- Admin Dashboard -->
    <div id="admin-dashboard" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <h1>Whisper+me Admin Dashboard</h1>
                <p style="color: #888;">Logged in as: <span id="admin-email-display"></span></p>
                <button class="logout-btn" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-users">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-calls">0</div>
                    <div class="stat-label">Total Calls</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-revenue">$0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pending-payouts">$0</div>
                    <div class="stat-label">Pending Payouts</div>
                </div>
            </div>
            
            <div class="admin-controls">
                <button class="admin-btn primary" onclick="giveFreeCoinsModal()">
                    <i class="fas fa-gift"></i> Give Free Coins
                </button>
                <button class="admin-btn" onclick="viewAllUsers()">
                    <i class="fas fa-users"></i> View All Users
                </button>
                <button class="admin-btn" onclick="viewAllCalls()">
                    <i class="fas fa-phone-alt"></i> View All Calls
                </button>
            </div>
            
            <div class="admin-section">
                <h3 class="section-title">Give Free Coins</h3>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="user-id" placeholder="Enter user ID">
                </div>
                <div class="form-group">
                    <label>Number of Coins (1-100)</label>
                    <input type="number" id="free-coins" min="1" max="100" value="10">
                </div>
                <button class="admin-btn primary" onclick="giveFreeCoins()">
                    Give Free Coins
                </button>
            </div>
            
            <div class="admin-section">
                <h3 class="section-title">Recent Calls (Last 50)</h3>
                <div id="calls-table">
                    <p style="color: #888;">Loading calls...</p>
                </div>
            </div>
            
            <div class="admin-section">
                <h3 class="section-title">User Complaints & Ratings</h3>
                <div id="complaints-list">
                    <p style="color: #888;">Loading complaints...</p>
                </div>
            </div>
            
            <div class="admin-section">
                <h3 class="section-title">Pending Payouts</h3>
                <div id="payouts-list">
                    <p style="color: #888;">Loading payouts...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase config
        firebase.initializeApp({
            apiKey: "AIzaSyALbIJSI2C-p6IyMtj_F0ZqGyN1i79jOd4",
            authDomain: "whisper-chat-live.firebaseapp.com",
            databaseURL: "https://whisper-chat-live-default-rtdb.firebaseio.com",
            projectId: "whisper-chat-live",
            storageBucket: "whisper-chat-live.firebasestorage.app",
            messagingSenderId: "302894848452",
            appId: "1:302894848452:web:61a7ab21a269533c426c91"
        });
        
        const auth = firebase.auth();
        const db = firebase.database();
        const ADMIN_PASSWORD = '068790Pw!';
        const ADMIN_EMAIL = 'ifanifwasafifth@gmail.com';
        
        // Check if admin is already logged in
        auth.onAuthStateChanged((user) => {
            if (user && user.email === ADMIN_EMAIL) {
                showAdminDashboard();
            }
        });
        
        // Admin login function
        function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('login-error');
            
            if (password !== ADMIN_PASSWORD) {
                errorEl.textContent = 'Incorrect password';
                errorEl.style.display = 'block';
                return;
            }
            
            // Sign in with email/password
            auth.signInWithEmailAndPassword(ADMIN_EMAIL, password)
                .then(() => {
                    showAdminDashboard();
                })
                .catch((error) => {
                    console.log('Login error:', error);
                    errorEl.textContent = 'Login failed: ' + error.message;
                    errorEl.style.display = 'block';
                });
        }
        
        // Admin logout function
        function adminLogout() {
            auth.signOut().then(() => {
                document.getElementById('admin-dashboard').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-password').value = '';
            });
        }
        
        // Show admin dashboard
        function showAdminDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            document.getElementById('admin-email-display').textContent = ADMIN_EMAIL;
            
            // Load all data
            loadStats();
            loadRecentCalls();
            loadComplaints();
            loadPayouts();
        }
        
        // Load admin stats
        async function loadStats() {
            try {
                // Load users count
                const usersSnap = await db.ref('users').once('value');
                document.getElementById('total-users').textContent = usersSnap.numChildren();
                
                // Load calls count
                const callsSnap = await db.ref('calls').once('value');
                document.getElementById('total-calls').textContent = callsSnap.numChildren();
                
                // Calculate revenue
                const purchasesSnap = await db.ref('purchases').once('value');
                let revenue = 0;
                purchasesSnap.forEach(child => {
                    revenue += child.val().amount || 0;
                });
                document.getElementById('total-revenue').textContent = '$' + revenue.toFixed(2);
                
                // Calculate pending payouts
                const payoutsSnap = await db.ref('payouts').orderByChild('status').equalTo('pending').once('value');
                let pending = 0;
                payoutsSnap.forEach(child => {
                    pending += child.val().amount || 0;
                });
                document.getElementById('pending-payouts').textContent = '$' + pending.toFixed(2);
                
            } catch (error) {
                console.log('Load stats error:', error);
            }
        }
        
        // Load recent calls
        async function loadRecentCalls() {
            try {
                const snapshot = await db.ref('calls').orderByChild('createdAt').limitToLast(50).once('value');
                const calls = [];
                
                snapshot.forEach(child => {
                    calls.push({ id: child.key, ...child.val() });
                });
                
                // Reverse to show newest first
                calls.reverse();
                
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Caller ID</th>
                                <th>Whisper ID</th>
                                <th>Coins</th>
                                <th>Status</th>
                                <th>Duration</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                calls.forEach(call => {
                    const date = new Date(call.createdAt).toLocaleString();
                    const status = call.status || 'unknown';
                    const statusColor = status === 'completed' ? '#10b981' : 
                                      status === 'active' ? '#3b82f6' : 
                                      status === 'waiting' ? '#f59e0b' : '#ef4444';
                    
                    html += `
                        <tr>
                            <td>${date}</td>
                            <td><code style="color: #888;">${call.callerId?.substring(0, 8)}...</code></td>
                            <td><code style="color: #888;">${call.whisperId?.substring(0, 8)}...</code></td>
                            <td>${call.coins || 1}</td>
                            <td style="color: ${statusColor}">${status}</td>
                            <td>${call.duration || 0}s</td>
                        </tr>
                    `;
                });
                
                html += `</tbody></table>`;
                
                document.getElementById('calls-table').innerHTML = html;
                
            } catch (error) {
                console.log('Load calls error:', error);
                document.getElementById('calls-table').innerHTML = '<p style="color: #ef4444;">Error loading calls</p>';
            }
        }
        
        // Load complaints
        async function loadComplaints() {
            try {
                const snapshot = await db.ref('ratings').orderByChild('timestamp').limitToLast(100).once('value');
                const complaints = [];
                
                snapshot.forEach(child => {
                    const rating = child.val();
                    if (rating.rating < 4 || rating.comment) {
                        complaints.push({ id: child.key, ...rating });
                    }
                });
                
                complaints.reverse();
                
                let html = '';
                
                complaints.forEach(complaint => {
                    const date = new Date(complaint.timestamp).toLocaleString();
                    const stars = '★'.repeat(Math.floor(complaint.rating)) + '☆'.repeat(5-Math.floor(complaint.rating));
                    
                    html += `
                        <div class="complaint-item">
                            <div class="complaint-header">
                                <span>${date}</span>
                                <span class="complaint-rating">${stars} (${complaint.rating}/5)</span>
                            </div>
                            <div>
                                <strong>Call ID:</strong> ${complaint.id.substring(0, 8)}...
                                <br>
                                <strong>From User:</strong> ${complaint.from?.substring(0, 8)}...
                            </div>
                            ${complaint.comment ? `
                                <div class="complaint-comment">
                                    "${complaint.comment}"
                                </div>
                            ` : ''}
                            <button class="admin-btn" onclick="investigateCall('${complaint.id}')" style="margin-top: 0.5rem;">
                                Investigate
                            </button>
                        </div>
                    `;
                });
                
                document.getElementById('complaints-list').innerHTML = html || '<p style="color: #888;">No complaints found</p>';
                
            } catch (error) {
                console.log('Load complaints error:', error);
                document.getElementById('complaints-list').innerHTML = '<p style="color: #ef4444;">Error loading complaints</p>';
            }
        }
        
        // Load payouts
        async function loadPayouts() {
            try {
                const snapshot = await db.ref('payouts').orderByChild('status').equalTo('pending').once('value');
                const payouts = [];
                
                snapshot.forEach(child => {
                    payouts.push({ id: child.key, ...child.val() });
                });
                
                payouts.sort((a, b) => b.date - a.date);
                
                let html = '';
                
                payouts.forEach(payout => {
                    const date = new Date(payout.date).toLocaleDateString();
                    
                    html += `
                        <div class="complaint-item">
                            <div class="complaint-header">
                                <span>${date}</span>
                                <span style="color: #10b981; font-weight: 600;">$${payout.amount}</span>
                            </div>
                            <div>
                                <strong>Whisper ID:</strong> ${payout.whisperId?.substring(0, 8)}...
                                <br>
                                <strong>Coins:</strong> ${payout.coins}
                            </div>
                            <div style="margin-top: 0.5rem;">
                                <button class="admin-btn primary" onclick="markPaid('${payout.id}')">
                                    Mark as Paid
                                </button>
                                <button class="admin-btn" onclick="viewUser('${payout.whisperId}')" style="margin-left: 0.5rem;">
                                    View User
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                document.getElementById('payouts-list').innerHTML = html || '<p style="color: #888;">No pending payouts</p>';
                
            } catch (error) {
                console.log('Load payouts error:', error);
                document.getElementById('payouts-list').innerHTML = '<p style="color: #ef4444;">Error loading payouts</p>';
            }
        }
        
        // Give free coins
        async function giveFreeCoins() {
            const userId = document.getElementById('user-id').value.trim();
            const coins = parseInt(document.getElementById('free-coins').value);
            
            if (!userId || !coins || coins < 1 || coins > 100) {
                alert('Please enter valid user ID and number of coins (1-100)');
                return;
            }
            
            try {
                // Add coins
                await db.ref('users/' + userId + '/coins').transaction(current => {
                    return (current || 0) + coins;
                });
                
                // Record admin action
                await db.ref('admin/actions').push().set({
                    type: 'free_coins',
                    admin: ADMIN_EMAIL,
                    userId: userId,
                    coins: coins,
                    date: Date.now()
                });
                
                alert(`✅ ${coins} free coins added to user ${userId.substring(0, 8)}...`);
                document.getElementById('user-id').value = '';
                
                // Reload stats
                loadStats();
                
            } catch (error) {
                console.log('Give coins error:', error);
                alert('Error giving coins. User might not exist.');
            }
        }
        
        function giveFreeCoinsModal() {
            document.getElementById('user-id').value = '';
            document.getElementById('free-coins').value = 10;
            document.querySelector('.admin-section').scrollIntoView({ behavior: 'smooth' });
        }
        
        function investigateCall(callId) {
            alert(`Call ID to investigate: ${callId}\n\nYou can find this call in the Firebase console under /calls/${callId}`);
        }
        
        function viewUser(userId) {
            alert(`User ID: ${userId}\n\nYou can view this user in the Firebase console under /users/${userId}`);
        }
        
        async function markPaid(payoutId) {
            if (confirm('Mark this payout as paid?')) {
                await db.ref('payouts/' + payoutId).update({ 
                    status: 'paid', 
                    paidAt: Date.now(),
                    paidBy: ADMIN_EMAIL 
                });
                alert('✅ Payout marked as paid');
                loadPayouts();
                loadStats();
            }
        }
        
        function viewAllUsers() {
            alert('View all users in Firebase console:\nhttps://console.firebase.google.com/project/whisper-chat-live/database/whisper-chat-live-default-rtdb/data/~2Fusers');
        }
        
        function viewAllCalls() {
            alert('View all calls in Firebase console:\nhttps://console.firebase.google.com/project/whisper-chat-live/database/whisper-chat-live-default-rtdb/data/~2Fcalls');
        }
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (document.getElementById('admin-dashboard').style.display !== 'none') {
                loadStats();
                loadRecentCalls();
                loadComplaints();
                loadPayouts();
            }
        }, 30000);
        
        // Enter key in password field
        document.getElementById('admin-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
        
        console.log('✅ Admin dashboard loaded');
    </script>
</body>
</html>
