<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Whisper+me</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
    }
    
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .admin-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
    }
    
    .admin-header h1 {
      color: #ef4444;
      margin-bottom: 0.5rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: #111;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #222;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 0.5rem;
    }
    
    .stat-label {
      color: #888;
      font-size: 0.9rem;
    }
    
    .admin-section {
      background: #111;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #222;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    
    th {
      color: #888;
      font-weight: 600;
    }
    
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #7c3aed;
      color: white;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group label {
      display: block;
      color: #888;
      margin-bottom: 0.5rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
    }
    
    /* Login Form for Admin */
    .login-form {
      max-width: 400px;
      margin: 100px auto;
      background: #111;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #222;
    }
    
    .login-form h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #7c3aed;
    }
    
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }
    
    .error-message {
      color: #ef4444;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #7c3aed;
      text-decoration: none;
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen (shown by default) -->
  <div id="login-screen">
    <div class="login-form">
      <h2>Admin Login</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="admin-email" placeholder="admin@email.com" value="ifanifwasafifth@gmail.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="••••••••">
      </div>
      <button class="login-btn" onclick="adminLogin()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <div class="error-message" id="login-error"></div>
      <a href="../" class="back-link">← Back to Main Site</a>
    </div>
  </div>
  
  <!-- Admin Dashboard (hidden until login) -->
  <div id="admin-dashboard" style="display: none;">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Whisper+me Admin Dashboard</h1>
        <p style="color: #888;">Logged in as: <span id="admin-email-display"></span></p>
        <button onclick="adminLogout()" style="background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; margin-top: 1rem; cursor: pointer;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total-users">0</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-calls">0</div>
          <div class="stat-label">Total Calls</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-revenue">$0</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pending-payouts">$0</div>
          <div class="stat-label">Pending Payouts</div>
        </div>
      </div>
      
      <div class="admin-section">
        <h3 style="margin-bottom: 1rem;">Give Free Coins</h3>
        <div class="form-group">
          <label>User ID</label>
          <input type="text" id="user-id" placeholder="Enter user ID">
        </div>
        <div class="form-group">
          <label>Number of Coins</label>
          <input type="number" id="free-coins" min="1" max="100" value="10">
        </div>
        <button class="btn btn-primary" onclick="giveFreeCoins()">Give Free Coins</button>
      </div>
      
      <div class="admin-section">
        <h3 style="margin-bottom: 1rem;">Recent Calls</h3>
        <div id="calls-table">
          <p style="color: #888;">Loading calls...</p>
        </div>
      </div>
      
      <div class="admin-section">
        <h3 style="margin-bottom: 1rem;">User Complaints & Ratings</h3>
        <div id="complaints-list">
          <p style="color: #888;">Loading...</p>
        </div>
      </div>
      
      <div class="admin-section">
        <h3 style="margin-bottom: 1rem;">Pending Payouts</h3>
        <div id="payouts-list">
          <p style="color: #888;">Loading payouts...</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    // Firebase config
    firebase.initializeApp({
      apiKey: "AIzaSyALbIJSI2C-p6IyMtj_F0ZqGyN1i79jOd4",
      authDomain: "whisper-chat-live.firebaseapp.com",
      databaseURL: "https://whisper-chat-live-default-rtdb.firebaseio.com",
      projectId: "whisper-chat-live",
      storageBucket: "whisper-chat-live.firebasestorage.app",
      messagingSenderId: "302894848452",
      appId: "1:302894848452:web:61a7ab21a269533c426c91"
    });
    
    const auth = firebase.auth();
    const db = firebase.database();
    
    // Check if admin is already logged in
    auth.onAuthStateChanged((user) => {
      if (user && user.email === 'ifanifwasafifth@gmail.com') {
        showAdminDashboard();
      }
    });
    
    // Admin login function
    function adminLogin() {
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      const errorEl = document.getElementById('login-error');
      
      if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        errorEl.style.display = 'block';
        return;
      }
      
      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          if (user.email === 'ifanifwasafifth@gmail.com') {
            showAdminDashboard();
          } else {
            errorEl.textContent = 'Access denied. Admin only.';
            errorEl.style.display = 'block';
            auth.signOut();
          }
        })
        .catch((error) => {
          console.log('Login error:', error);
          errorEl.textContent = error.message || 'Login failed';
          errorEl.style.display = 'block';
        });
    }
    
    // Admin logout function
    function adminLogout() {
      auth.signOut().then(() => {
        document.getElementById('admin-dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
      });
    }
    
    // Show admin dashboard
    function showAdminDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'block';
      document.getElementById('admin-email-display').textContent = auth.currentUser.email;
      
      // Load stats
      loadStats();
      loadRecentCalls();
      loadComplaints();
      loadPayouts();
    }
    
    // Load admin stats
    async function loadStats() {
      try {
        // Load users count
        const usersSnap = await db.ref('users').once('value');
        document.getElementById('total-users').textContent = usersSnap.numChildren();
        
        // Load calls count
        const callsSnap = await db.ref('calls').once('value');
        document.getElementById('total-calls').textContent = callsSnap.numChildren();
        
        // Calculate revenue (simplified)
        const purchasesSnap = await db.ref('purchases').once('value');
        let revenue = 0;
        purchasesSnap.forEach(child => {
          revenue += child.val().amount || 0;
        });
        document.getElementById('total-revenue').textContent = '$' + revenue;
        
        // Calculate pending payouts
        const payoutsSnap = await db.ref('payouts').orderByChild('status').equalTo('pending').once('value');
        let pending = 0;
        payoutsSnap.forEach(child => {
          pending += child.val().amount || 0;
        });
        document.getElementById('pending-payouts').textContent = '$' + pending;
        
      } catch (error) {
        console.log('Load stats error:', error);
      }
    }
    
    // Load recent calls
    async function loadRecentCalls() {
      try {
        const snapshot = await db.ref('calls').orderByChild('createdAt').limitToLast(20).once('value');
        const calls = [];
        
        snapshot.forEach(child => {
          calls.push({ id: child.key, ...child.val() });
        });
        
        // Reverse to show newest first
        calls.reverse();
        
        const html = `
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Caller</th>
                <th>Whisper</th>
                <th>Coins</th>
                <th>Status</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody>
              ${calls.map(call => `
                <tr>
                  <td>${new Date(call.createdAt).toLocaleDateString()}</td>
                  <td>${call.callerId?.substring(0, 8)}...</td>
                  <td>${call.whisperId?.substring(0, 8)}...</td>
                  <td>${call.coins || 1}</td>
                  <td style="color: ${call.status === 'completed' ? '#10b981' : '#ef4444'}">
                    ${call.status || 'unknown'}
                  </td>
                  <td>${call.duration || 0}s</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        
        document.getElementById('calls-table').innerHTML = html;
        
      } catch (error) {
        console.log('Load calls error:', error);
      }
    }
    
    // Load complaints
    async function loadComplaints() {
      try {
        const snapshot = await db.ref('ratings').orderByChild('timestamp').limitToLast(50).once('value');
        const ratings = [];
        
        snapshot.forEach(child => {
          const rating = child.val();
          if (rating.rating < 3 || rating.comment) {
            ratings.push({ id: child.key, ...rating });
          }
        });
        
        ratings.reverse();
        
        const html = ratings.map(rating => `
          <div style="background: #1a1a1a; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
              <span>Call ID: ${rating.id.substring(0, 8)}...</span>
              <span style="color: ${rating.rating < 3 ? '#ef4444' : '#fbbf24'}">
                ${rating.rating} ⭐
              </span>
            </div>
            <p style="color: #888; margin-bottom: 0.5rem;">From: ${rating.from?.substring(0, 8)}...</p>
            ${rating.comment ? `<p style="color: white;">"${rating.comment}"</p>` : ''}
            <button class="btn btn-danger" style="margin-top: 0.5rem;" onclick="investigateCall('${rating.id}')">
              Investigate
            </button>
          </div>
        `).join('');
        
        document.getElementById('complaints-list').innerHTML = html || '<p style="color: #888;">No complaints found</p>';
        
      } catch (error) {
        console.log('Load complaints error:', error);
      }
    }
    
    // Load payouts
    async function loadPayouts() {
      try {
        const snapshot = await db.ref('payouts').orderByChild('status').equalTo('pending').once('value');
        const payouts = [];
        
        snapshot.forEach(child => {
          payouts.push({ id: child.key, ...child.val() });
        });
        
        const html = payouts.map(payout => `
          <div style="background: #1a1a1a; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
              <span>User: ${payout.whisperId?.substring(0, 8)}...</span>
              <span style="color: #10b981; font-weight: 600;">$${payout.amount}</span>
            </div>
            <p style="color: #888; margin-bottom: 0.5rem;">
              ${payout.coins} coin${payout.coins > 1 ? 's' : ''} • ${new Date(payout.date).toLocaleDateString()}
            </p>
            <div style="display: flex; gap: 0.5rem;">
              <button class="btn btn-primary" onclick="markPaid('${payout.id}')">Mark as Paid</button>
              <button class="btn" style="background: #333; color: white;" onclick="viewUser('${payout.whisperId}')">View User</button>
            </div>
          </div>
        `).join('');
        
        document.getElementById('payouts-list').innerHTML = html || '<p style="color: #888;">No pending payouts</p>';
        
      } catch (error) {
        console.log('Load payouts error:', error);
      }
    }
    
    // Give free coins
    async function giveFreeCoins() {
      const userId = document.getElementById('user-id').value.trim();
      const coins = parseInt(document.getElementById('free-coins').value);
      
      if (!userId || !coins || coins < 1) {
        alert('Please enter valid user ID and number of coins');
        return;
      }
      
      try {
        // Add coins
        await db.ref('users/' + userId + '/coins').transaction(current => {
          return (current || 0) + coins;
        });
        
        // Record admin action
        await db.ref('admin/actions').push().set({
          type: 'free_coins',
          admin: 'ifanifwasafifth@gmail.com',
          userId: userId,
          coins: coins,
          date: Date.now()
        });
        
        alert(`✅ ${coins} free coins added to user ${userId.substring(0, 8)}...`);
        document.getElementById('user-id').value = '';
        
      } catch (error) {
        console.log('Give coins error:', error);
        alert('Error giving coins. User might not exist.');
      }
    }
    
    function investigateCall(callId) {
      window.open(`/?call=${callId}`, '_blank');
    }
    
    function markPaid(payoutId) {
      if (confirm('Mark this payout as paid?')) {
        db.ref('payouts/' + payoutId).update({ status: 'paid', paidAt: Date.now() });
        alert('✅ Payout marked as paid');
        loadPayouts();
        loadStats();
      }
    }
    
    function viewUser(userId) {
      alert(`User ID: ${userId}\n\nTo view full details, check Firebase console.`);
    }
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
      if (document.getElementById('admin-dashboard').style.display !== 'none') {
        loadStats();
        loadRecentCalls();
        loadComplaints();
        loadPayouts();
      }
    }, 30000);
    
    // Enter key in password field
    document.getElementById('admin-password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') adminLogin();
    });
    
    console.log('✅ Admin dashboard loaded');
  </script>
</body>
</html>
