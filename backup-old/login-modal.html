<!-- Login/Signup Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="auth-modal">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="signup">Sign Up</button>
      <button class="close-auth" onclick="closeAuthModal()">×</button>
    </div>
    
    <!-- Login Form -->
    <div class="auth-form active" id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="login()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <p class="auth-footer">
        Don't have an account? <a href="#" onclick="switchAuthTab('signup')">Sign up</a>
      </p>
    </div>
    
    <!-- Signup Form -->
    <div class="auth-form" id="signup-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="signup()">
        <i class="fas fa-user-plus"></i> Sign Up
      </button>
      <p class="auth-footer">
        Already have an account? <a href="#" onclick="switchAuthTab('login')">Login</a>
      </p>
    </div>
  </div>
</div>
