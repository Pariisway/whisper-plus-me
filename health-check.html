<!DOCTYPE html>
<html>
<head>
    <title>Whisper+me - Health Check</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .status {
            font-size: 48px;
            margin: 20px 0;
        }
        .healthy { color: #4CAF50; }
        .timestamp {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Whisper+me</h1>
        <div class="status healthy">✅ HEALTHY</div>
        <p>GitHub Pages deployment is working correctly.</p>
        <p><strong>Last Deployed:</strong> <span id="timestamp">Loading...</span></p>
        <p><a href="/" style="color: white; text-decoration: underline;">Go to Main App →</a></p>
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toISOString();
        
        // Test Firebase connection
        setTimeout(() => {
            console.log('Testing Firebase...');
            fetch('https://whisper-chat-live-default-rtdb.firebaseio.com/.json')
                .then(response => {
                    console.log('Firebase connection:', response.ok ? '✅ OK' : '❌ Failed');
                })
                .catch(err => console.log('Firebase test error:', err));
        }, 1000);
    </script>
</body>
</html>
