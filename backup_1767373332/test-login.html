<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALbIJSI2C-p6IyMtj_F0ZqGyN1i79jOd4",
            authDomain: "whisper-chat-live.firebaseapp.com",
            databaseURL: "https://whisper-chat-live-default-rtdb.firebaseio.com",
            projectId: "whisper-chat-live",
            storageBucket: "whisper-chat-live.firebasestorage.app",
            messagingSenderId: "302894848452",
            appId: "1:302894848452:web:61a7ab21a269533c426c91"
        };
        
        firebase.initializeApp(firebaseConfig);
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const result = await firebase.auth().signInWithEmailAndPassword(email, password);
                document.getElementById('result').innerHTML = '✅ Login successful!';
                console.log('User:', result.user);
            } catch (error) {
                document.getElementById('result').innerHTML = `❌ Error: ${error.message}`;
                console.error('Login error:', error);
            }
        }
        
        async function testDatabase() {
            try {
                const snapshot = await firebase.database().ref('users').once('value');
                const users = snapshot.val();
                document.getElementById('db-result').innerHTML = `✅ Database accessible. Users: ${Object.keys(users || {}).length}`;
            } catch (error) {
                document.getElementById('db-result').innerHTML = `❌ Database error: ${error.message}`;
            }
        }
    </script>
</head>
<body>
    <h1>Test Firebase</h1>
    <div>
        <h3>Test Login</h3>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="testLogin()">Login</button>
        <div id="result"></div>
    </div>
    <div>
        <h3>Test Database</h3>
        <button onclick="testDatabase()">Test Database Access</button>
        <div id="db-result"></div>
    </div>
</body>
</html>
